spring:
  jpa:
    properties:
      hibernate:
        format_sql: true
    show-sql: true
  quartz:
    job-store-type: memory
    properties:
      org.quartz.threadPool.threadCount: 3

rpa:
  auth:
    disabled: true

spring.ai:
  openai:
    api-key: ${LLM_API_KEY:}
    base-url: ${LLM_API_BASE_URL:https://x666.me/v1}
    chat:
      options:
        model: ${LLM_MODEL:gemini-2.5-flash}

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.type.descriptor.sql.BasicBinder: trace
