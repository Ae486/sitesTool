server:
  port: 8000

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/rpa_cloud?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    property-naming-strategy: SNAKE_CASE
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null
  flyway:
    locations: classpath:db/migration
    baseline-on-migrate: true
    out-of-order: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  quartz:
    job-store-type: jdbc
    jdbc:
      initialize-schema: never
    properties:
      org.quartz.threadPool.threadCount: 5

rpa:
  auth:
    disabled: false
    secret-key: ${JWT_SECRET:change-me-in-production-at-least-32-chars!!}
    token-expire-minutes: 60
  execution:
    process-timeout-seconds: 300
    worker-pool-core: 4
    worker-pool-max: 8
    queue-capacity: 100
  cors:
    origins: http://localhost:5173,http://localhost:3000
  llm:
    default-rpm: 60
    pre-freeze-padding: 2000
    internal-token-secret: ${LLM_INTERNAL_TOKEN_SECRET:change-me-internal-secret-at-least-32-chars!!}

spring.ai:
  openai:
    api-key: ${LLM_API_KEY:sk-placeholder}
    base-url: ${LLM_API_BASE_URL:https://api.openai.com}
    chat:
      options:
        model: ${LLM_MODEL:gpt-4o}
        temperature: 0.7
